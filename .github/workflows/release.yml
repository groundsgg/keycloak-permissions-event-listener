name: Publish Release Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release metadata
        run: |
          if [[ ! "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "Failed to resolve release metadata (gitRef=${GITHUB_REF:-<empty>})"
            exit 1
          fi

          tag_name="${GITHUB_REF#refs/tags/}"
          version_override="${tag_name#v}"

          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"
          echo "VERSION_OVERRIDE=$version_override" >> "$GITHUB_ENV"
          echo "JAR_PATH=build/libs/keycloak-permissions-event-listener.jar" >> "$GITHUB_ENV"
          echo "RELEASE_ASSET_PATH=build/libs/keycloak-permissions-event-listener-$version_override.jar" >> "$GITHUB_ENV"

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Publish package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish -PversionOverride="$VERSION_OVERRIDE"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -f "$JAR_PATH" ]]; then
            echo "Failed to upload release asset (jarPath=$JAR_PATH, reason=asset_not_found)"
            exit 1
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Failed to upload release asset (tagName=$TAG_NAME, reason=release_not_found)"
            exit 1
          fi

          cp "$JAR_PATH" "$RELEASE_ASSET_PATH"
          gh release upload "$TAG_NAME" "$RELEASE_ASSET_PATH" --clobber
